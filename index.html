<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Elyonko Shop | متجر البطاقات الرقمية</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Firebase configuration (ضع إعداداتك هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyA8O0b6eRTSzIL2tBLHRbgOJPvdP3YvbdI",
            authDomain: "redeemstore-442e9.firebaseapp.com",
            projectId: "redeemstore-442e9",
            storageBucket: "redeemstore-442e9.firebasestorage.app",
            messagingSenderId: "310108021195",
            appId: "1:310108021195:web:f7dc3a59286c7d311a964e"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.auth = auth;
        window.signInWithPopup = signInWithPopup;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f7ff;
            color: #1a2a6c;
            line-height: 1.6;
        }
        
        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1a2a6c, #2a4a9e);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }
        
        .logo i {
            font-size: 1.8rem;
            color: #ffd700;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: 0.3s;
        }
        
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        
        .user-profile:hover {
            background: rgba(255,255,255,0.25);
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #e8eeff, #ffffff);
        }
        
        .hero h1 {
            font-size: 2rem;
            color: #1a2a6c;
        }
        
        .hero h1 i {
            color: #ffd700;
        }
        
        .hero p {
            color: #4a6a9e;
            margin-top: 0.5rem;
        }
        
        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 1.5rem 2rem;
        }
        
        /* Section Title */
        .section-title {
            font-size: 1.8rem;
            margin: 1.5rem 0 1rem;
            color: #1a2a6c;
            border-right: 5px solid #2a4a9e;
            padding-right: 1rem;
        }
        
        /* Cards Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #dce4fc;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(26,42,108,0.15);
        }
        
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .card-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
        
        .card h3 {
            color: #1a2a6c;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        
        .card p {
            color: #6a8aba;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2a4a9e;
            margin: 0.8rem 0;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #1a2a6c, #2a4a9e);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-buy:hover {
            transform: scale(0.98);
            background: linear-gradient(135deg, #2a4a9e, #1a2a6c);
        }
        
        /* Contact Strip */
        .contact-strip {
            background: #1a2a6c;
            padding: 1.2rem;
            border-radius: 60px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 2rem 0;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            cursor: pointer;
        }
        
        .contact-item i {
            font-size: 1.4rem;
            color: #ffd700;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-card {
            background: white;
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            color: #1a2a6c;
        }
        
        .modal-card h2 {
            margin-bottom: 1.5rem;
        }
        
        .modal-card button {
            background: #1a2a6c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        
        .google-btn {
            background: white;
            color: #1a2a6c;
            border: 2px solid #1a2a6c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .close-modal {
            background: #ccc;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logout-icon {
            cursor: pointer;
            margin-right: 8px;
            color: #ffd700;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            background: #1a2a6c;
            color: white;
            margin-top: 2rem;
        }
        
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <i class="fas fa-gamepad"></i>
        <span>ELYONKO <span style="color:#ffd700;">Shop</span></span>
    </div>
    <div class="nav-links">
        <a href="#">الرئيسية</a>
        <a href="#">البطاقات</a>
        <a href="#">تواصل</a>
        <div class="user-profile" id="userProfileBtn">
            <i class="fas fa-user-circle"></i>
            <span id="userNameDisplay">دخول</span>
            <span id="logoutBtn" class="logout-icon" style="display:none;">✖</span>
        </div>
    </div>
</div>

<section class="hero">
    <h1><i class="fas fa-crown"></i> متجر اليونكو</h1>
    <p>أسرع شحن للبطاقات الرقمية | PUBG | Free Fire | فيفا | جواهر</p>
    <p style="font-size:0.9rem;">المنتج موجود من وزارة التجارة يملك سجل تجاري ✅</p>
</section>

<div class="container">
    <div class="section-title">
        <i class="fas fa-fire" style="color:#ffd700;"></i> الأكثر شراء
    </div>
    
    <div class="products-grid" id="productsGrid"></div>
    
    <div class="contact-strip">
        <div class="contact-item" id="whatsappBtn">
            <i class="fab fa-whatsapp"></i> الدعم الفني
        </div>
        <div class="contact-item" id="telegramBtn">
            <i class="fab fa-telegram"></i> @elyonko
        </div>
        <div class="contact-item">
            <i class="fas fa-clock"></i> متوفّرين 24 ساعة
        </div>
    </div>
</div>

<footer>
    <p>جميع الأكواد لدينا نظامية من الشركة الأم ✅</p>
    <p>www.elyonkoshop.com</p>
</footer>

<!-- Modal تسجيل الدخول -->
<div id="authModal" class="modal">
    <div class="modal-card">
        <h2><i class="fas fa-user-lock"></i> تسجيل الدخول</h2>
        <button id="googleSignInBtn" class="google-btn">
            <i class="fab fa-google"></i> تسجيل دخول عبر Google
        </button>
        <button id="closeModalBtn" class="close-modal">إغلاق</button>
    </div>
</div>

<script type="module">
    // بيانات المنتجات (بطاقات الألعاب)
    const products = [
        { id: 1, name: "PUBG", desc: "بطاقات ببجي موبايل - شحن فوري", price: "10$", icon: "fas fa-gun", image: "🎮" },
        { id: 2, name: "FREE FIRE", desc: "شحن دايموند - شحن فوري", price: "5$", icon: "fas fa-fire", image: "🔥" },
        { id: 3, name: "شحن فيفا", desc: "بطاقات فيفا - نقاط FIFA", price: "15$", icon: "fas fa-futbol", image: "⚽" },
        { id: 4, name: "جواهر فيفاي", desc: "بطاقات جواهر - شحن فوري", price: "8$", icon: "fas fa-gem", image: "💎" },
        { id: 5, name: "بطاقات ببجي", desc: "شحن مباشر - UC", price: "12$", icon: "fas fa-gamepad", image: "🕹️" },
        { id: 6, name: "شحن فري فاير", desc: "شحن دايموند بأفضل الأسعار", price: "7$", icon: "fas fa-bolt", image: "⚡" }
    ];
    
    let currentUser = null;
    const auth = window.auth;
    const signInWithPopup = window.signInWithPopup;
    const GoogleAuthProvider = window.GoogleAuthProvider;
    const signOut = window.signOut;
    const onAuthStateChanged = window.onAuthStateChanged;
    
    // عرض المنتجات
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-icon">
                    <span style="font-size:2.5rem;">${product.image}</span>
                </div>
                <h3>${product.name}</h3>
                <p>${product.desc}</p>
                <div class="price">${product.price}</div>
                <button class="btn-buy" data-id="${product.id}">
                    <i class="fas fa-shopping-cart"></i> شراء الآن
                </button>
            `;
            card.querySelector('.btn-buy').addEventListener('click', () => buyProduct(product));
            grid.appendChild(card);
        });
    }
    
    function buyProduct(product) {
        if (!currentUser) {
            alert("🔐 يرجى تسجيل الدخول أولاً");
            openAuthModal();
            return;
        }
        
        let message = `🛍️ طلب شراء من متجر اليونكو\n\n`;
        message += `المنتج: ${product.name}\n`;
        message += `السعر: ${product.price}\n`;
        message += `العميل: ${currentUser.email}\n\n`;
        message += `الرجاء إرسال تفاصيل الدفع وطريقة الاستلام.`;
        
        window.open(`https://wa.me/+249901839168?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    // وظائف المصادقة
    const authModal = document.getElementById('authModal');
    
    function openAuthModal() {
        authModal.classList.add('active');
    }
    
    function closeAuthModal() {
        authModal.classList.remove('active');
    }
    
    async function handleGoogleSignIn() {
        try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);
            currentUser = result.user;
            updateUIForUser();
            closeAuthModal();
        } catch (error) {
            console.error(error);
            alert("خطأ في تسجيل الدخول: " + error.message);
        }
    }
    
    async function handleSignOut() {
        try {
            await signOut(auth);
            currentUser = null;
            updateUIForUser();
            alert("تم تسجيل الخروج بنجاح");
        } catch (error) {
            console.error(error);
        }
    }
    
    function updateUIForUser() {
        const userNameSpan = document.getElementById('userNameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        
        if (currentUser) {
            const name = currentUser.displayName || currentUser.email.split('@')[0];
            userNameSpan.innerHTML = `<i class="fas fa-user-check"></i> ${name}`;
            logoutBtn.style.display = 'inline';
        } else {
            userNameSpan.innerHTML = '<i class="fas fa-user-circle"></i> دخول';
            logoutBtn.style.display = 'none';
        }
    }
    
    // مراقبة حالة المستخدم
    if (onAuthStateChanged) {
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            updateUIForUser();
        });
    }
    
    // إضافة مستمعي الأحداث
    document.getElementById('userProfileBtn').addEventListener('click', () => {
        if (!currentUser) openAuthModal();
    });
    
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        handleSignOut();
    });
    
    document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleSignIn);
    document.getElementById('closeModalBtn').addEventListener('click', closeAuthModal);
    
    // أزرار التواصل
    document.getElementById('whatsappBtn').addEventListener('click', () => {
        window.open('https://wa.me/+249901839168', '_blank');
    });
    document.getElementById('telegramBtn').addEventListener('click', () => {
        window.open('https://t.me/elyonko', '_blank');
    });
    
    // إغلاق المودال عند الضغط خارجها
    authModal.addEventListener('click', (e) => {
        if (e.target === authModal) closeAuthModal();
    });
    
    // بدء التشغيل
    renderProducts();
    console.log("✅ متجر اليونكو يعمل!");
</script>
</body>
</html>
